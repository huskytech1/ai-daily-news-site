name: Update AI Daily News

on:
  workflow_dispatch:
  schedule:
    - cron: "27 1 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-daily-news-pages
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static site
        env:
          AI_DAILY_NEWS_OUTPUT_DIR: site
          TZ: Asia/Shanghai
        run: |
          mkdir -p site
          python scripts/main.py
          latest_file=$(ls -t site/AI_Daily_News_*.html | head -n 1)
          cp "$latest_file" site/index.html
          rm -f site/AI_Daily_News_*.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: update-news
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
