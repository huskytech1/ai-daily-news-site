name: Update AI Daily News

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 1-8 * * 1-5"
    - cron: "0 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static site
        env:
          AI_DAILY_NEWS_OUTPUT_DIR: site
        run: |
          mkdir -p site
          python scripts/main.py
          latest_file=$(ls -t site/AI_Daily_News_*.html | head -n 1)
          cp "$latest_file" site/index.html
          rm -f site/AI_Daily_News_*.html

      - name: Commit and push updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "huskytech1"
          git config user.email "huskytech1@users.noreply.github.com"
          git add site
          git commit -m "Update AI daily news"
          git push
