name: Update AI Daily News

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-daily-news-pages
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static site
        env:
          AI_DAILY_NEWS_OUTPUT_DIR: site
        run: |
          mkdir -p site
          python scripts/main.py
          latest_file=$(ls -t site/AI_Daily_News_*.html | head -n 1)
          cp "$latest_file" site/index.html
          rm -f site/AI_Daily_News_*.html

      - name: Commit and push updates
        run: |
          if [ -z "$(git status --porcelain site)" ]; then
            echo "No site changes to commit"
          else
            git config user.name "huskytech1"
            git config user.email "huskytech1@users.noreply.github.com"
            git add site
            git commit -m "Update AI daily news"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: update-news
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
